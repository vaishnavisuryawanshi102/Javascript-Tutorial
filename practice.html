<!DOCTYPE html>

    <meta charset="UTF-8">

<body>
    
    <script>
       let number = Number(prompt("Enter Number"))
          if(number == 0){
              console.log("Number is ZERO")
          }else if(number > 0){
              console.log("Number is POSITIVE NUMBER")
          }else{
              console.log("Number is NEGETIVE")
          }

    </script>

    <script>
        let num = Number(prompt("Enter number"))
        for(i=1; i<=10; i++){
            console.log(num, "*", i, "=", num*i)
        }
    </script>


    
</body>
</html>
